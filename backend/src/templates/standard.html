<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{catalogName}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  
  @page {
    size: A4;
    margin: 0;
  }
  
  body {
    font-family: 'Inter', Helvetica, sans-serif;
    color: #374151;
    margin: 0;
    padding: 0;
    background: #ffffff;
  }

  .cover-page {
    height: calc(100vh - 40mm);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #F5F3FF;
    page-break-after: always;
    border: 1px solid #E5E7EB;
  }

  .cover-title {
    font-size: 48px;
    color: #1E1B4B;
    margin-bottom: 20px;
    font-weight: 700;
  }
  
  .content-page {
    padding: 0;
  }

  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
  }

  .product-card {
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    overflow: hidden;
    page-break-inside: avoid;
    background: #fff;
  }

  .product-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }

  .product-details {
    padding: 16px;
  }

  .product-name {
    margin: 0 0 8px 0;
    font-size: 18px;
    font-weight: 600;
    color: #1E1B4B;
  }

  .product-price {
    margin: 0 0 8px 0;
    font-size: 16px;
    font-weight: 700;
    color: #7C3AED;
  }

  .product-sku {
    margin: 0 0 8px 0;
    font-size: 12px;
    color: #6B7280;
  }

  .product-description {
    margin: 0;
    font-size: 13px;
    color: #6B7280;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="cover-page">
    <h1 class="cover-title">{{catalogName}}</h1>
    <p style="color: #6B7280; font-size: 18px;">Product Catalog</p>
  </div>
  <div class="content-page">
    {{productsHTML}}
  </div>
</body>
</html>
